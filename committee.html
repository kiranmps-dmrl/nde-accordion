<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Committees</title>\n    <link rel="stylesheet" href="styles.css">\n    <style>\n        /* Simple styling for the accordions */\n        .accordion {\n            background-color: #f1f1f1;\n            color: #444;\n            cursor: pointer;\n            padding: 10px;\n            width: 100%;\n            border: none;\n            text-align: left;\n            outline: none;\n            font-size: 15px;\n            transition: background-color 0.4s;\n        }\n        .active, .accordion:hover {\n            background-color: #ccc;\n        }\n        .panel {\n            padding: 0 18px;\n            display: none;\n            overflow: hidden;\n            background-color: white;\n        }\n    </style>\n</head>\n<body>\n    <h1>Committees</h1>\n    <button class="accordion">International Relationship Committee</button>\n    <div class="panel">\n        <ul>\n            <li>Member A</li>\n            <li>Member B</li>\n            <li>Member C</li>\n        </ul>\n    </div>\n    <button class="accordion">Industry Relationship Committee</button>\n    <div class="panel">\n        <ul>\n            <li>Member X</li>\n            <li>Member Y</li>\n            <li>Member Z</li>\n        </ul>\n    </div>\n    <script>\n        const accordions = document.getElementsByClassName("accordion");\n        for (let i = 0; i < accordions.length; i++) {\n            accordions[i].addEventListener("click", function() {\n                this.classList.toggle("active");\n                const panel = this.nextElementSibling;\n                if (panel.style.display === "block") {\n                    panel.style.display = "none";\n                } else {\n                    panel.style.display = "block";\n                }\n            });\n        }\n    <\/script>\n</body>\n</html>
